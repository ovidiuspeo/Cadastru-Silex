<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Listare Peșteri</title>

  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Conexiune Supabase -->
  <script src="supabase.js"></script>

  <!-- Funcții listare -->
  <script src="listare.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #999; padding: 6px; font-size: 14px; }
    th { background: #eee; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h3>Acces restricționat</h3>
  Parolă: <input id="pass" type="password">
  <button onclick="login()">Intră</button>
</div>

<!-- CONȚINUT -->
<div id="content" style="display:none;">

  <h2>Listare peșteri după CodB1</h2>

  CodB1:
  <input id="bazin" type="text">
  <button onclick="loadBazin()">Caută</button>

  <table id="tabelPesteri">
    <thead>
      <tr>
        <th>CodB1</th>
        <th>NrP1</th>
        <th>Var</th>
        <th>Denumire</th>
        <th>Nr Desc</th>
        <th>AltAbs</th>
        <th>AltRel</th>
        <th>DezvTot</th>
        <th>DenivNC</th>
        <th>DenivPC</th>
        <th>ExtReal</th>
        <th>num_map</th>
        <th>Club</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
function login() {
  const parola = document.getElementById("pass").value;
  if (parola !== "demo123") {
    alert("Parolă greșită");
    return;
  }
  document.getElementById("login").style.display = "none";
  document.getElementById("content").style.display = "block";
}
</script>

</body>
</html>
